name: Generate and Release PDFs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate flash cards
        run: |
          python generate.py --kana -o output/flashcards-55x82.pdf
          python generate.py --kana -o output/flashcards-63x88.pdf --card-width 63 --card-height 88
          python generate.py --kana -o output/flashcards-74x105.pdf --card-width 74 --card-height 105

      - name: Generate practice sheets
        run: |
          python generate.py --kana --practice -o output/practice-hiragana.pdf --hiragana-only
          python generate.py --kana --practice -o output/practice-katakana.pdf --katakana-only

      - name: Generate reference charts
        run: |
          python generate.py --kana --chart -o output/chart.pdf
          python generate.py --kana --chart -o output/chart-hiragana.pdf --hiragana-only
          python generate.py --kana --chart -o output/chart-katakana.pdf --katakana-only

      - name: Generate stroke order
        run: |
          python generate.py --kana --stroke-order -o output/stroke-order.pdf
          python generate.py --kana --stroke-order -o output/stroke-order-hiragana.pdf --hiragana-only
          python generate.py --kana --stroke-order -o output/stroke-order-katakana.pdf --katakana-only

      - name: Generate vocabulary PDFs
        run: |
          for level in n5 n4 n3 n2 n1; do
            python generate.py --vocabulary --jlpt $level
            python generate.py --vocabulary --jlpt $level --lang sv
          done

      - name: Generate Anki decks
        run: python generate.py --anki

      - name: Generate story PDFs
        run: python generate.py --stories

      - name: Generate example images
        run: |
          sudo apt-get install -y poppler-utils
          python generate.py --generate-examples

      - name: Commit updated example images
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/example_flashcards_front.jpg docs/example_flashcards_back.jpg docs/example_practice.jpg docs/example_chart.jpg docs/example_stroke_order.jpg docs/example_vocabulary.jpg
          git diff --staged --quiet || git commit -m "docs: update example images [skip ci]"
          git push

      - name: Set calver tag
        id: version
        run: echo "tag=$(date -u +'%Y.%m.%d').${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          make_latest: true
          files: |
            output/*.pdf
            output/story_*.pdf
            output/*.apkg
